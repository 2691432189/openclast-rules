[custom]
;不要随意改变关键字，否则会导致出错
;acl4SSR规则

;去广告：支持
;自动测速：支持
;微软分流：支持
;苹果分流：支持
;增强中国IP段：支持
;增强国外GFW：支持

;设置规则标志位
ruleset=Ⓜ️ 微软服务,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Microsoft.list
ruleset=🍎 苹果服务,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Apple.list
ruleset=📲 电报消息,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Telegram.list
ruleset=💬 Ai平台,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/AI.list
ruleset=💬 Ai平台,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/OpenAi.list
ruleset=📹 油管视频,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/YouTube.list
ruleset=🌍 国外媒体,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ProxyMedia.list
ruleset=🚀 节点选择,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ProxyGFWlist.list
;设置规则标志位

;设置分组标志位
custom_proxy_group=🚀 节点选择`select`[]故障转移`[]香港-自动`[]日本-自动`[]新加坡-自动`[]美国-自动`^((?!(港|HK|hk|日本|JP|Japan|新加坡|SG|Singapore|美|US|United States)).)*$`[]DIRECT
custom_proxy_group=📲 电报消息`select`[]香港-自动`[]日本-自动`[]新加坡-自动`[]美国-自动`[]DIRECT
custom_proxy_group=💬 Ai平台`select`[]香港-自动`[]日本-自动`[]新加坡-自动`[]美国-自动`[]DIRECT
custom_proxy_group=📹 油管视频`select`[]香港-自动`[]日本-自动`[]新加坡-自动`[]美国-自动`[]DIRECT
custom_proxy_group=🌍 国外媒体`select`[]香港-自动`[]日本-自动`[]新加坡-自动`[]美国-自动`[]DIRECT
custom_proxy_group=Ⓜ️ 微软服务`select`[]香港-自动`[]日本-自动`[]新加坡-自动`[]美国-自动`[]DIRECT
custom_proxy_group=🍎 苹果服务`select`[]香港-自动`[]日本-自动`[]新加坡-自动`[]美国-自动`[]DIRECT


custom_proxy_group=香港-自动`url-test`(?=.*(港|HK|hk|Hong Kong|HongKong|hongkong))^((?!直连).)*$`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=日本-自动`url-test`(?=.*(日本|川日|东京|大阪|泉日|埼玉|沪日|深日|JP|Japan))^((?!直连).)*$`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=美国-自动`url-test`(?=.*(美|波特兰|达拉斯|俄勒冈|凤凰城|费利蒙|硅谷|拉斯维加斯|洛杉矶|圣何塞|圣克拉拉|西雅图|芝加哥|US|United States))^((?!直连).)*$`http://www.gstatic.com/generate_204`300,,150
custom_proxy_group=新加坡-自动`url-test`(?=.*(新加坡|坡|狮城|SG|Singapore))^((?!直连).)*$`http://www.gstatic.com/generate_204`300,,50

custom_proxy_group=故障转移`fallback`(直连)`http://www.gstatic.com/generate_204`300,,50
;设置分组标志位

enable_rule_generator=true
overwrite_original_rules=true

;clash_rule_base=https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/GeneralClashConfig.yml

;luck
